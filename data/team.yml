members:
  - bio: Behaviour change specialist Anna has worked in sustainable transport since
      2008, at first focussing on bikes with Sustrans, and now on aviation with
      Flight Free UK. A lifelong environmentalist, she stopped flying more than
      15 years ago. A favourite flight-free trip was cycling the length of
      France to swim in the Mediterranean at Nice – returning by train rather
      than cycle home!
    name: Anna Hughes
    photo: /images/uploads/anna.jpeg
    role: Director
  - name: Gully Bujak
    role: Communications Officer
    photo: /images/uploads/gully-bujak.jpg
    bio: Gully is a community organiser and freelance writer based in Hull. She is
      passionate about the power of words and storytelling to inspire us to
      imagine new ways of living together on this finite planet. Her dream
      flight free trip would be to the US, to visit the immense landscapes and
      learn from the community organising going there.
  - name: Matilda Palmer
    role: Events Manager
    bio: Matilda lives in Hampshire and enjoys local conservation and litter picking
      in her spare time. She is passionate about travel infrastructure to give
      people more opportunities to travel greener. A dream flight-free trip
      would be to the north coast of Spain via ferry.
    photo: /images/uploads/matilda_palmer.jpeg
  - name: Sarah Hopewell
    role: Finance volunteer
    bio: With a background in health psychology and behaviour change, Sarah now
      works in the transport sector. She's a Green Party town and district
      councillor in Hertford and has enjoyed many flight-free trips including
      cycling holidays and trips to Europe.
    photo: /images/uploads/sarah-hopewell.jpeg
  - name: Sophie Norstrom
    role: Communications intern
    bio: Philosophy graduate Sophie is passionate about understanding the social,
      political and economic inequalities of climate change. She is based in
      Edinburgh and enjoys exploring Scottish green spaces by finding new
      running routes. Her dream flight free trip would be to island-hop around
      the Stockholm Archipelago by ferry.
    photo: /images/uploads/sophie-norstrom.jpg
